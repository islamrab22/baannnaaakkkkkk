services:
  - type: web
    name: bank-of-palestine-cms
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      # Render injects PORT automatically at runtime — do not set it manually.
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
